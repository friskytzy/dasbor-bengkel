name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: "postgresql://user:pass@localhost:5432/dasbor?schema=public"
  CLERK_SECRET_KEY: "sk_test_ci_dummy_secret_key_for_build_only"
  # decode -> clerk.example.com$ (sintaks Base64 valid; tidak untuk produksi)
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZGFzYm9yLWJlbmdrZWwuZXhhbXBsZS5jb20k"
  FONNTE_API_KEY: "dummy"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  REDIS_URL: "redis://localhost:6379"
  CRON_SECRET: "ci-secret"

jobs:
  lint-typecheck-build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
